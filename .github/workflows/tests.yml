name: Run Tests

# Триггер запуска при каждом push в ветку main (или master) или pull из них
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-process:
    # Выделение виртуальной машины на Linux
    runs-on: ubuntu-latest

    # Подключение дополнительных сервисов (MongoDB)
    services:
      mongodb:
        image: mongo:6.0
        # command: mongod --replSet rs0 # Запуск MongoDB с флагом репликации
        ports:
          - 27017:27017

    steps:
    # Скачивание кода из Git
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # Установка чистой Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm' # Кэширование зависимостей для ускорения сборки

    # Подключение к MongoDB и инициализация реплики из одного узла
    # - name: Initialize MongoDB Replica Set
    #   run:
    #     mongosh --host 127.0.0.1:27017 --eval 'rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "127.0.0.1:27017" }] })'

    # Чистая установка всех пакетов из package-lock.json
    - name: Install Dependencies
      run: npm ci

    # Запуск тестов (команда из скриптов package.json)
    - name: Run Unit and Integration Tests
      env:
        CI: true # Переменная GitHub (наглядное дублирование)
      run: npm test
